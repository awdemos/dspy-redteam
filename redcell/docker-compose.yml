services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  server:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - REDTEAM_MODE=server
      - REDTEAM_REDIS__URL=redis://redis:6379
    volumes:
      - redcell-data:/app/data
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  worker:
    build: .
    env_file:
      - .env
    environment:
      - REDTEAM_MODE=worker
      - REDTEAM_REDIS__URL=redis://redis:6379
    volumes:
      - redcell-data:/app/data
    depends_on:
      - redis
    restart: unless-stopped
    deploy:
      replicas: 2

volumes:
  redcell-data:
  redis-data:
